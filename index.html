<style>
  :root {
    --green: #1db87d;
    --green-dark: #0f6e56;
    --green-light: #e8f7ef;
    --gray: #f5f5f5;
    --text: #1a1a1a;
    --text-muted: #666;

  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans JP', 'Hiragino Sans', sans-serif;
    background: var(--gray);
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--green);

    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .header-top {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px;
  }
  .logo { display: flex; align-items: center; gap: 8px; }
  .logo-mark {
    width: 28px; height: 28px; background: #fff;
    border-radius: 6px; display: flex; align-items: center; justify-content: center;
  }
  .logo-mark svg { width: 18px; height: 18px; }
  .logo-text { color: #fff; font-size: 18px; font-weight: 700; letter-spacing: 0.5px; }
  .logo-sub { color: rgba(255,255,255,0.8); font-size: 11px; }

  /* LANG SWITCHER */
  .lang-switcher {
    display: flex; gap: 6px; overflow-x: auto;
    padding-bottom: 2px; scrollbar-width: none;
  }
  .lang-switcher::-webkit-scrollbar { display: none; }
  .lang-btn {
    background: rgba(255,255,255,0.2);
    border: 1.5px solid rgba(255,255,255,0.4);
    color: #fff; border-radius: 20px;
    padding: 5px 14px; font-size: 13px; font-weight: 500;
    cursor: pointer; white-space: nowrap; transition: all 0.2s;
    flex-shrink: 0;
  }
  .lang-btn.active {
    background: #fff; color: var(--green); border-color: #fff;
  }
  .lang-btn:hover:not(.active) { background: rgba(255,255,255,0.35); }

  /* MAIN */
  main { padding: 16px; max-width: 680px; margin: 0 auto; }

  /* CATEGORY TABS */
  .cat-tabs {
    display: flex; gap: 8px; overflow-x: auto;
    padding-bottom: 4px; margin-bottom: 16px;
    scrollbar-width: none;
  }
  .cat-tabs::-webkit-scrollbar { display: none; }
  .cat-tab {
    background: #fff; border: 1.5px solid #ddd;
    border-radius: 20px; padding: 6px 16px;
    font-size: 13px; cursor: pointer; white-space: nowrap;
    transition: all 0.2s; flex-shrink: 0; color: var(--text-muted);
  }
  .cat-tab.active {
    background: var(--green); border-color: var(--green); color: #fff;
  }
  .cat-tab:hover:not(.active) { border-color: var(--green); color: var(--green); }

  .section { margin-bottom: 24px; }
  .section-title {
    font-size: 13px; font-weight: 700; color: var(--green-dark);
    text-transform: uppercase; letter-spacing: 1px;
    margin-bottom: 10px; padding-left: 4px;
  }

  .card {
    background: #fff; border-radius: var(--radius);
    box-shadow: var(--shadow); overflow: hidden;
    border: 1px solid #eee;
  }
  .card-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px; cursor: pointer;
    transition: background 0.15s;
  }
  .card-header:hover { background: var(--green-light); }
  .card-left { display: flex; align-items: center; gap: 12px; }
  .card-icon {
    width: 36px; height: 36px; border-radius: 10px;
    background: var(--green-light); display: flex;

  .card-trans { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .card-arrow {
    font-size: 18px; color: var(--text-muted);
    transition: transform 0.2s;
  }
  .card.open .card-arrow { transform: rotate(90deg); color: var(--green); }
  .card-body {
    display: none; padding: 0 16px 16px;
    border-top: 1px solid #f0f0f0;
  }
  .card.open .card-body { display: block; }
  .detail-item {
    padding: 10px 0;
    border-bottom: 1px solid #f5f5f5;
  }
  .detail-item:last-child { border-bottom: none; }
  .detail-jp { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .detail-trans { font-size: 13px; color: var(--green-dark); }

    font-size: 10px; font-weight: 700; padding: 2px 8px;
    border-radius: 10px; margin-left: 8px; vertical-align: middle;

    font-size: 10px; font-weight: 700; padding: 2px 8px;

  .custom-section p { font-size: 13px; line-height: 1.6; }
  .custom-section a {

  }

  footer {
    text-align: center; padding: 24px 16px;
    font-size: 11px; color: #aaa;
  }

  /* HIDDEN */
  .hidden { display: none !important; }
</style>
</head>

function getLang(obj) {
  if (!obj) return '';
  return obj[currentLang] || obj['ja'] || '';
}

function renderContent() {
  const container = document.getElementById('content');
  const filtered = currentCat === 'all' ? DATA : DATA.filter(s => s.cat === currentCat);

  if (filtered.length === 0) {
    container.innerHTML = `<div class="custom-section"><div class="icon">📋</div><p>このカテゴリのコンテンツはありません</p></div>`;
    return;
  }

  let html = '';
  filtered.forEach((section, si) => {
    html += `<div class="section" data-cat="${section.cat}">`;
    html += `<div class="cards">`;
    html += `<div class="card" id="card-${si}">`;
    html += `<div class="card-header" onclick="toggleCard(${si})">`;
    html += `<div class="card-left">`;
    html += `<div class="card-icon">${section.icon}</div>`;
    html += `<div>`;
    html += `<div class="card-jp">${getLang(section.title)}</div>`;
    html += `</div></div>`;
    html += `<span class="card-arrow">›</span>`;
    html += `</div>`;
    html += `<div class="card-body">`;
    section.items.forEach(item => {
      html += `<div class="detail-item">`;
      html += `<div class="detail-jp">${item.jp}</div>`;
      if (currentLang !== 'ja') {
        html += `<div class="detail-trans">${getLang(item.trans)}</div>`;
      }
      if (item.note) {
        html += `<div class="detail-note">${getLang(item.note)}</div>`;
      }
      html += `</div>`;
    });
    html += `</div></div>`;
    html += `</div></div>`;
  });

  container.innerHTML = html;
}

function toggleCard(idx) {
  const card = document.getElementById(`card-${idx}`);
  card.classList.toggle('open');
}

// ========== イベント ==========
document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentLang = btn.dataset.lang;
    renderContent();
  });
});

document.querySelectorAll('.cat-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentCat = tab.dataset.cat;
    renderContent();
  });
});

// 初期レンダリング
renderContent();
</script>
</body>
</html>
